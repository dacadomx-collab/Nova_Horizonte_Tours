name: 🚀 Pipeline CI/CD - Nova Horizonte Tours

on:
  push:
    branches:
      - main

jobs:
  production-deploy:
    name: Despliegue de Ultra-Lujo (Fricción Cero)
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Extracción de Código Fuente
        uses: actions/checkout@v4

      - name: 🔒 Sincronización Blindada vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          # CORRECCIÓN DE IMPACTO: Usamos './' porque el usuario FTP ya inicia sesión en public_html/nova/
          server-dir: ./
          # Exclusión explícita de archivos locales y gobernanza
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            knowledge/**
            core/.env
            CORE/.env
            core/.env.example
            CORE/.env.example
            logs/**
            node_modules/**
            .next/**
            out/**
            CLAUDE.md
            README.md
            *.md
            *.sql